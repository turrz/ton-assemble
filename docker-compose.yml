version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["pnpm", "--filter", "@ton-site-builder/api", "start"]
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      - bot
    volumes:
      - ./data:/app/data

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["pnpm", "--filter", "@ton-site-builder/bot", "start"]
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - ./data:/app/data

